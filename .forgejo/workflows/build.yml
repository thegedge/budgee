name: Build and push
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: kaniko
    steps:
      - uses: actions/checkout@v4

      - name: Build and push image
        run: >-
          /data/kaniko --dockerfile=Dockerfile --context=. --build-arg=COMMIT_SHA=${{ github.sha }}
          --build-arg=COMMIT_DATE=${{ github.event.head_commit.timestamp }}
          --destination=app.forgejo.svc:3000/gedge/${{ github.event.repository.name }}:${{
          github.sha }} --destination=app.forgejo.svc:3000/gedge/${{ github.event.repository.name
          }}:latest
